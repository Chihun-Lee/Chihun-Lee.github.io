name: Deploy Website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'Website/**'
      - 'data/**'
      - 'CV/build/cv.pdf'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Website/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Copy CV PDF into public/ (if present)
        run: |
          if [ -f "../CV/build/cv.pdf" ]; then
            cp ../CV/build/cv.pdf public/cv.pdf
            echo "Copied CV PDF."
          else
            echo "CV/build/cv.pdf not found — skipping. The /cv page will show a 404 for the PDF until the CV agent produces it."
          fi

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

short_bio: >
  Senior Researcher at the Korea Institute of Materials Science (KIMS), working at
  the intersection of artificial intelligence and physical sciences. My research
  focuses on optimization-driven design across four interconnected domains:
  manufacturing processes, nanophotonic devices, materials, and autonomous
  experimentation for metals. I build AI toolkits that turn data and physics into
  manufacturable designs.

long_bio: >
  I am a Senior Researcher at the Material Data & Analysis Research Division of
  the Korea Institute of Materials Science (KIMS). I earned my Ph.D. (2025), M.S.
  (2019), and B.S. (2018) in Mechanical Engineering from POSTECH, advised by
  Prof. Junsuk Rho (Ph.D.) and Prof. Seongjin Park (M.S.). My research builds
  end-to-end AI/optimization pipelines spanning the four pillars of (i)
  manufacturing process optimization, (ii) nanophotonic inverse design,
  (iii) materials property optimization, and (iv) autonomous experimentation
  for metal alloys. I co-develop AI codes with industry partners (POSCO, LG
  Display, Samsung Display, Hanwha Defense, LS mtron) and academic labs
  (Korea Univ., Hanyang Univ., Leibniz IFW Dresden, IKV-AACHEN).

research_interests:
  - AI for materials
  - AI for manufacturing
  - Metamaterials and nanophotonic inverse design
  - Autonomous experimentation for metals

# Four pillars used for grouping on the website
research_pillars:
  - id: manufacturing
    title: Manufacturing Optimization
    kr: 제조 최적화
    color: "#CC785C"   # Crail / Claude accent
    blurb: >
      Data-driven and physics-informed optimization for injection molding, hot-rolled
      coil placement, punch press, drilling, DED metal 3D printing, powder injection
      molding, and powder manufacturing. The goal is to shorten process set-up time
      and minimize defects through learned process–property models.
  - id: nanophotonics
    title: Nanophotonics Optimization
    kr: 나노포토닉스 최적화
    color: "#B8956A"   # warm bronze
    blurb: >
      Inverse design of metasurfaces and metamaterials — color filters, achromatic
      metalenses, meta-holograms, transmissive antennas, OLED light control, and
      3D nanopatterning masks. I combine adjoint methods, automatic differentiation,
      neural surrogates, and global optimizers (PSO, GA, CMA-ES, DDQN, GP).
  - id: materials
    title: Materials Optimization
    kr: 소재 최적화
    color: "#7A8C7E"   # sage
    blurb: >
      AI-driven materials design and property prediction — cold compaction of
      Fe–C/Fe–C–Cu powders, latent diffusion for dual-phase steel microstructures,
      and stainless steel powder rheology. Built on top of constitutive relations
      and learned microstructure–property maps.
  - id: autonomous-metal-lab
    title: Metal Autonomous Laboratory
    kr: 금속 자율실험실
    color: "#5C6B7A"   # cool slate
    blurb: >
      Closing the loop between simulation, optimization, and physical experiment
      for metal alloys. Active learning, Bayesian optimization with Gaussian
      processes, and orchestrated experimentation drive efficient discovery of
      laser powder bed fusion parameters and beyond.

